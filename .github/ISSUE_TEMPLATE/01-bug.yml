name: Bug report
description: File a bug report.
title: "[Bug]: "
type: "Bug"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: checkboxes
    id: prereqs
    attributes:
      label: I have done the following
      description: Select that you have completed the following prerequisites. 
      options:
        - label: I have searched the existing issues
          required: true
        - label: If possible, I've reproduced the issue using the 'main' branch of this project
          required: false
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: |
        Explain how to reproduce the incorrect behavior. 
        
        📖 **Need help?** See our guide: [How to write effective reproduction steps](../../docs/bug-report-how-to.md#steps-to-reproduce)
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: Current behavior
      description: |
        A concise description of what you're experiencing.
        
        📖 **Need help?** See our guide: [Current Behavior](../../docs/bug-report-how-to.md#current-behavior)
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: |
        A concise description of what you expected to happen.
        
        📖 **Need help?** See our guide: [Expected Behavior](../../docs/bug-report-how-to.md#expected-behavior)
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment 
      description: |
        Examples: 
          - **OS**: macOS 26.0 (25A354)
          - **Xcode**: Version 26.0 (17A324)
          - **Container**: Container CLI version 0.1.0
        
        📖 **Need help gathering this info?** See our guide: [Environment Information](../../docs/bug-report-how-to.md#environment-information)
      value: |
        - OS: 
        - Xcode: 
        - Container: 
      render: markdown
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
        
        📖 **Need help finding logs?** See our guide: [Log Information](../../docs/bug-report-how-to.md#log-information)
      value: |
        N/A
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/apple/.github/blob/main/CODE_OF_CONDUCT.md).
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
